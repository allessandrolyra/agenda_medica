name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Detectar diretório
        id: dir
        run: |
          if [ -f package.json ]; then
            echo "dir=." >> $GITHUB_OUTPUT
          elif [ -f Clinica/package.json ]; then
            echo "dir=Clinica" >> $GITHUB_OUTPUT
          else
            echo "ERRO: package.json não encontrado na raiz nem em Clinica/"
            exit 1
          fi

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        working-directory: ${{ steps.dir.outputs.dir }}
        run: npm install

      - name: Lint
        working-directory: ${{ steps.dir.outputs.dir }}
        run: npm run lint

      - name: Test
        working-directory: ${{ steps.dir.outputs.dir }}
        run: npm run test

      - name: Build
        working-directory: ${{ steps.dir.outputs.dir }}
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_BASE_PATH: /${{ github.event.repository.name }}/
          VITE_APP_BASENAME: /${{ github.event.repository.name }}/
        run: |
          if [ -z "$VITE_SUPABASE_URL" ] || [ "$VITE_SUPABASE_URL" = "" ]; then
            echo "ERRO: Configure VITE_SUPABASE_URL e VITE_SUPABASE_ANON_KEY em Settings > Secrets"
            exit 1
          fi
          npm run build
          cp dist/index.html dist/404.html
          touch dist/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ steps.dir.outputs.dir }}/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
