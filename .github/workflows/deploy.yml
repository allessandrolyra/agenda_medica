name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detectar diretório
        id: dir
        run: |
          if [ -f package.json ]; then
            echo "dir=." >> $GITHUB_OUTPUT
          elif [ -f Clinica/package.json ]; then
            echo "dir=Clinica" >> $GITHUB_OUTPUT
          else
            echo "ERRO: package.json não encontrado na raiz nem em Clinica/"
            exit 1
          fi

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        working-directory: ${{ steps.dir.outputs.dir }}
        run: npm install

      - name: Build
        working-directory: ${{ steps.dir.outputs.dir }}
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_BASE_PATH: /${{ github.event.repository.name }}/
          VITE_APP_BASENAME: /${{ github.event.repository.name }}/
        run: |
          if [ -z "$VITE_SUPABASE_URL" ] || [ "$VITE_SUPABASE_URL" = "" ]; then
            echo "ERRO: Configure VITE_SUPABASE_URL e VITE_SUPABASE_ANON_KEY em Settings > Secrets"
            exit 1
          fi
          npm run build
          cp dist/index.html dist/404.html

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ${{ steps.dir.outputs.dir }}/dist
          force_orphan: true
