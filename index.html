<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#15803d" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="format-detection" content="telephone=no" />
    <title>Agenda Médica Online</title>
  </head>
  <body style="background:#f8fafc;color:#1e293b;margin:0;min-height:100vh">
    <div id="root">
      <div style="display:flex;align-items:center;justify-content:center;min-height:100vh;flex-direction:column;gap:1rem">
        <div style="width:48px;height:48px;border:4px solid #e2e8f0;border-top-color:#16a34a;border-radius:50%;animation:spin 1s linear infinite"></div>

      </div>

    <style>@keyframes spin{to{transform:rotate(360deg)}}</style>
    <script type="module" src="/src/main.tsx"></script>
    <noscript><p style="padding:2rem;text-align:center">Habilite JavaScript para usar esta aplicação.</p></noscript>
